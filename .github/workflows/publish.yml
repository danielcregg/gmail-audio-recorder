name: Publish to Chrome Web Store

# Triggered when you push a version tag, e.g.:
#   git tag v1.0.1
#   git push origin v1.0.1

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  # First: run the full test suite
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run test:ci

  # Then: package and publish
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Package extension
        run: |
          zip -r gmail-audio-recorder.zip \
            manifest.json \
            content.js \
            styles.css \
            src/ \
            icons/
          echo "📦 Packaged: $(du -h gmail-audio-recorder.zip | cut -f1)"

      - name: Upload to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: gmail-audio-recorder.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
