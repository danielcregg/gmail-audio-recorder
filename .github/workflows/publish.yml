name: Publish

# Triggered when you push a version tag:
#   git tag v1.0.1 && git push origin v1.0.1

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  # ── Run full test suite first ──
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run test:ci

  # ── Package, create GitHub Release, publish to Chrome Web Store ──
  release:
    name: Release & Publish
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Package extension
        run: |
          zip -r gmail-audio-recorder-${{ steps.version.outputs.version }}.zip \
            manifest.json \
            content.js \
            styles.css \
            src/ \
            icons/ \
            LICENSE \
            README.md
          echo "📦 Packaged: $(du -h gmail-audio-recorder-${{ steps.version.outputs.version }}.zip | cut -f1)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.version.outputs.version }} — Gmail Audio Recorder"
          generate_release_notes: true
          files: gmail-audio-recorder-${{ steps.version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: gmail-audio-recorder-${{ steps.version.outputs.version }}.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
